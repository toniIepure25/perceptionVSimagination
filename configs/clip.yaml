# =============================================================================
# CLIP Model Configuration
# =============================================================================
#
# Authoritative config for CLIP embedding extraction.
# Used by clip_utils.py and build_clip_cache.py.
#
# The fMRI encoders train against ViT-L/14 (768-D) targets defined in
# base.yaml. This is the same model used for the CLIP cache.
#
# Supported models:
#   ViT-B/32  — 512-D, fastest (legacy, no longer used)
#   ViT-B/16  — 512-D, better quality
#   ViT-L/14  — 768-D, high quality (default, used as fMRI training target)
#   ViT-L/14@336px — 768-D, highest quality
# =============================================================================

model_name: "ViT-L/14"
pretrained: "openai"
embedding_dim: 768
context_length: 77

device: "cuda"
batch_size: 256

normalize_embeddings: true
precision: "fp32"

cache_embeddings: true
cache_dir: "outputs/clip_cache"
