# =============================================================================
# H100 80GB Optimized Configuration Overlay
# =============================================================================
#
# Apply on top of base.yaml for NVIDIA H100 with 500GB RAM.
# Enables TF32, larger batch sizes, and aggressive data loading.
#
# Usage:
#   python scripts/train_two_stage.py \
#     --config configs/base.yaml \
#     --override-config configs/system/h100_80gb.yaml
#
# Author: Perception vs. Imagination Project
# Date: March 2026
# =============================================================================

# Override dataset settings for high-memory system
dataset:
  num_workers: 8                     # 500GB RAM can afford generous prefetch
  pin_memory: true
  prefetch_factor: 4                 # Double default — H100 bus is fast

# Preprocessing — use all available RAM
preprocessing:
  pca_k: 3072                       # Match actual pipeline (3072-D PCA features)

# CLIP — large batch for fast cache building
clip:
  device: cuda
  batch_size: 512                    # H100 80GB can handle 512 easily for ViT-L/14

# Training — H100-optimized
training:
  device: cuda
  mixed_precision: true              # BF16/TF32 — critical for H100 Tensor Cores
  gradient_clip: 1.0

  # H100 can handle larger effective batch sizes
  # Two-stage SOTA uses batch_size=48 + accumulation_steps=2 = 96 effective
  # On H100 we can increase to batch_size=128 + accumulation_steps=1 = 128 effective
  # This reduces training time by ~40%

# Diffusion — leverage full VRAM
diffusion:
  dtype: float16                     # H100 has fast FP16 with Tensor Cores
  enable_attention_slicing: false    # Not needed with 80GB VRAM
  enable_vae_slicing: false          # Not needed with 80GB VRAM
  enable_cpu_offload: false          # Keep everything on GPU

# H100-specific CUDA settings
# Set these environment variables before running:
#   export PYTORCH_CUDA_ALLOC_CONF="expandable_segments:True"
#   export CUDA_LAUNCH_BLOCKING=0
#
# In Python, also set:
#   torch.backends.cuda.matmul.allow_tf32 = True
#   torch.backends.cudnn.allow_tf32 = True
#   torch.set_float32_matmul_precision('high')  # Enables TF32 globally

# Hardware profile (for reproducibility.yaml reference)
hardware:
  gpu:
    name: "NVIDIA H100 80GB"
    vram_gb: 80
    architecture: "Hopper"
    cuda_compute_capability: "9.0"
    optimal_cuda_version: "12.4"
    tensor_core_precision: ["FP64", "TF32", "BF16", "FP16", "FP8", "INT8"]
  ram_gb: 500
  recommended_batch_sizes:
    clip_cache_building: 512
    ridge_training: 4096              # Ridge uses sklearn, CPU-bound + RAM
    mlp_training: 256
    two_stage_training: 128
    adapter_training: 128
    evaluation: 256
    diffusion_generation: 8           # SD generation is VRAM-bound
  recommended_num_workers: 8
